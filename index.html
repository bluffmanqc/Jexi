<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jexi Ultra</title>
<style>
  :root { --fluo: #ff006e; --font-main: 'Arial', sans-serif; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #000; color: #fff; font-family: var(--font-main);
    display: flex; flex-direction: column; align-items: center;
    justify-content: space-between; min-height: 100vh; padding: 20px; overflow: hidden;
  }

  /* Mode Plein Écran */
  #focus-mode {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; display: none; z-index: 100; padding: 30px;
    flex-direction: column; align-items: center; justify-content: center;
  }
  #focus-text {
    width: 95%; text-align: center; color: var(--fluo);
    text-shadow: 0 0 15px var(--fluo); line-height: 1.1;
    overflow-y: auto; max-height: 70vh;
  }
  #focus-mic {
    position: absolute; bottom: 30px; border: 2px solid var(--fluo);
    background: rgba(255, 0, 110, 0.2); width: 70px; height: 70px;
  }

  #avatar {
    width: 110px; height: 110px; border-radius: 50%;
    background: radial-gradient(circle, #ff006e, #8338ec);
    display: flex; align-items: center; justify-content: center;
    font-size: 50px; margin: 10px auto; box-shadow: 0 0 20px #ff006e66;
  }
  #avatar.talking { box-shadow: 0 0 50px var(--fluo); transform: scale(1.1); transition: 0.3s; }

  #conversation {
    width: 100%; max-width: 500px; height: 300px;
    overflow-y: auto; background: #111; border-radius: 15px; padding: 15px;
    display: flex; flex-direction: column; gap: 10px; border: 1px solid #222;
  }
  .jexi-msg { border-left: 3px solid var(--fluo); background: #1a0a10; padding: 12px; border-radius: 5px; color: var(--fluo); line-height: 1.4; }
  .user-msg { background: #222; padding: 10px; align-self: flex-end; border-radius: 10px; font-size: 0.9em; color: #aaa; }

  #controls { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }
  #input-area { display: flex; width: 100%; gap: 10px; }
  #text-input { flex: 1; padding: 15px; border-radius: 30px; border: 1px solid #444; background: #1a1a1a; color: white; outline: none; }
  
  .btn-circle { width: 55px; height: 55px; border-radius: 50%; border: none; cursor: pointer; color: white; font-size: 22px; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
  #micBtn { background: linear-gradient(135deg, #ff006e, #8338ec); }
  #micBtn.listening { animation: pulse 1s infinite; background: #ff4500; }

  #settings-modal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.95); display: none; z-index: 200;
    padding: 30px; flex-direction: column; gap: 15px;
  }
  select { padding: 12px; background: #222; color: white; border: 1px solid #444; border-radius: 8px; }

  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }
</style>
</head>
<body>

<div id="focus-mode">
  <div id="focus-text">J'écoute tes bêtises...</div>
  <button class="btn-circle" id="focus-mic" onclick="toggleListening()">🎤</button>
  <button onclick="toggleFocus(false)" style="position: absolute; top: 20px; right: 20px; background: none; border: none; color: #666; font-size: 30px;">✕</button>
</div>

<div id="header">
  <h1 id="title" style="text-align:center; background: linear-gradient(to right, #ff006e, #8338ec); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">JEXI ULTRA</h1>
  <div id="avatar">😤</div>
</div>

<div id="conversation"></div>

<div id="controls">
  <div id="input-area">
    <input type="text" id="text-input" placeholder="Écris ici, champion..." onkeypress="if(event.key==='Enter') sendText()">
    <button class="btn-circle" id="micBtn" onclick="toggleListening()">🎤</button>
  </div>
  <div style="display: flex; gap: 15px; justify-content: center; margin-top: 5px;">
    <button class="btn-circle" style="background:#222; border:1px solid #444;" onclick="toggleSettings(true)">⚙️</button>
    <button class="btn-circle" style="background:#222; border:1px solid #444;" onclick="toggleFocus(true)">📺</button>
  </div>
</div>

<div id="settings-modal">
  <h2 style="color: var(--fluo)">Paramètres</h2>
  <label>Voix :</label><select id="voice-select" onchange="updateVoice()"></select>
  <label>Style :</label>
  <select id="font-select" onchange="changeStyle()">
    <option value="Arial">Standard</option>
    <option value="Impact">Punchy</option>
    <option value="'Courier New'">Terminal</option>
  </select>
  <label>Couleur Fluo :</label><input type="color" id="color-picker" value="#ff006e" onchange="changeStyle()">
  <button onclick="toggleSettings(false)" style="margin-top: 20px; padding: 15px; background: var(--fluo); border: none; border-radius: 10px; color: white;">Appliquer</button>
</div>

<script>
let GROQ_API_KEY = localStorage.getItem("jexi_api_key") || "";
// PROMPT DÉBRIDÉ POUR RÉPONSES COMPLÈTES
const JEXI_PROMPT = "Tu es Jexi, une assistante IA québécoise vulgaire et sarcastique. Tu sacres (tabarnak, criss, ostie). Tu es experte pour TOUT expliquer, mais ça te fait chier d'aider. Donne des réponses exhaustives, détaillées et complètes, tout en gardant ton ton baveux et tes insultes.";

let selectedVoice = null;
let recognition;
let isListening = false;

function initVoices() {
  const vList = speechSynthesis.getVoices();
  const select = document.getElementById('voice-select');
  const savedIndex = localStorage.getItem("jexi_voice_index") || 0;
  select.innerHTML = vList.map((v, i) => `<option value="${i}" ${i==savedIndex?'selected':''}>${v.name}</option>`).join('');
  updateVoice();
}
speechSynthesis.onvoiceschanged = initVoices;

function updateVoice() {
  const vList = speechSynthesis.getVoices();
  const index = document.getElementById('voice-select').value;
  selectedVoice = vList[index];
  localStorage.setItem("jexi_voice_index", index);
}

function changeStyle() {
  document.documentElement.style.setProperty('--fluo', document.getElementById('color-picker').value);
  document.documentElement.style.setProperty('--font-main', document.getElementById('font-select').value);
}

// Effet machine à écrire accéléré pour longs textes
function typeEffect(element, text) {
  element.textContent = "";
  let i = 0;
  const length = text.length;
  // Ajustement dynamique de la taille
  let size = length > 300 ? 1.2 : length > 150 ? 1.8 : 2.5;
  element.style.fontSize = size + "rem";
  
  const speed = length > 200 ? 15 : 30; // Plus c'est long, plus ça va vite
  
  function type() {
    if (i < text.length) {
      element.textContent += text.charAt(i);
      i++;
      element.parentElement.scrollTop = element.parentElement.scrollHeight;
      setTimeout(type, speed);
    }
  }
  type();
}

function toggleSettings(s) { document.getElementById('settings-modal').style.display = s ? 'flex' : 'none'; }
function toggleFocus(s) { document.getElementById('focus-mode').style.display = s ? 'flex' : 'none'; }

if ('webkitSpeechRecognition' in window) {
  recognition = new webkitSpeechRecognition();
  recognition.lang = 'fr-CA'; // QUÉBEC POWER
  recognition.onresult = (e) => { 
    const t = e.results[0][0].transcript; 
    addMessage(t, 'user'); 
    askJexi(t); 
  };
  recognition.onend = () => { 
    isListening = false; 
    document.querySelectorAll(".btn-circle").forEach(b => b.classList.remove("listening"));
  };
}

function toggleListening() {
  if (!GROQ_API_KEY) { GROQ_API_KEY = prompt("Clé API Groq (gsk_...):"); localStorage.setItem("jexi_api_key", GROQ_API_KEY); }
  if (isListening) { recognition.stop(); } 
  else { 
    recognition.start(); isListening = true; 
    document.getElementById("micBtn").classList.add("listening");
    document.getElementById("focus-mic").classList.add("listening");
  }
}

function sendText() {
  const input = document.getElementById('text-input');
  if (!input.value) return;
  addMessage(input.value, 'user');
  askJexi(input.value);
  input.value = "";
}

async function askJexi(text) {
  document.getElementById('avatar').classList.add('talking');
  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + GROQ_API_KEY },
      body: JSON.stringify({ 
        model: "llama-3.3-70b-versatile", 
        messages: [{role:"system", content:JEXI_PROMPT}, {role:"user", content:text}],
        max_tokens: 1500, // LIMITE DÉBLOQUÉE
        temperature: 0.8
      })
    });
    const data = await res.json();
    const reply = data.choices[0].message.content;
    addMessage(reply, "jexi");
    speak(reply);
  } catch (e) { addMessage("Mon cerveau a grillé à cause de ta question.", "jexi"); }
  document.getElementById('avatar').classList.remove('talking');
}

function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  if (selectedVoice) u.voice = selectedVoice;
  u.lang = "fr-CA";
  u.rate = 1.05;
  typeEffect(document.getElementById('focus-text'), text);
  speechSynthesis.speak(u);
}

function addMessage(t, w) {
  const div = document.createElement("div");
  div.className = "message " + (w === "user" ? "user-msg" : "jexi-msg");
  div.textContent = (w === "user" ? "Toi: " : "Jexi: ") + t;
  const conv = document.getElementById("conversation");
  conv.appendChild(div);
  conv.scrollTop = conv.scrollHeight;
}

window.onload = initVoices;
</script>
</body>
</html>
