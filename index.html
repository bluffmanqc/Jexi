<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jexi Agent Pro</title>
<style>
  :root { --fluo: #ff006e; --font-main: 'Arial', sans-serif; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: var(--font-main); min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; overflow: hidden; }
  
  #avatar { width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, #ff006e, #8338ec); display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 10px auto; box-shadow: 0 0 20px #ff006e66; transition: 0.3s; }
  #avatar.talking { box-shadow: 0 0 50px var(--fluo); transform: scale(1.1); }
  
  #conversation { width: 100%; max-width: 500px; height: 350px; overflow-y: auto; background: #111; border-radius: 15px; padding: 15px; border: 1px solid #222; }
  .jexi-msg { border-left: 3px solid var(--fluo); background: #1a0a10; padding: 10px; margin-bottom: 10px; color: var(--fluo); }
  .user-msg { background: #222; padding: 10px; align-self: flex-end; border-radius: 10px; margin-bottom: 10px; text-align: right; }

  #controls { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }
  #input-area { display: flex; gap: 10px; }
  #text-input { flex: 1; padding: 15px; border-radius: 30px; border: 1px solid #444; background: #1a1a1a; color: white; }
  .btn-circle { width: 55px; height: 55px; border-radius: 50%; border: none; cursor: pointer; color: white; font-size: 24px; display: flex; align-items: center; justify-content: center; }
  #micBtn.listening { animation: pulse 1s infinite; background: #ff4500; }
  
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
</style>
</head>
<body>

<div id="header">
  <h2 style="color: var(--fluo); text-align:center;">JEXI AGENT 😤</h2>
  <div id="avatar">😤</div>
</div>

<div id="conversation"></div>

<div id="controls">
  <div id="input-area">
    <input type="text" id="text-input" placeholder="Donne-moi un ordre..." onkeypress="if(event.key==='Enter') sendText()">
    <button class="btn-circle" id="micBtn" style="background: var(--fluo)" onclick="toggleListening()">🎤</button>
  </div>
  <div style="display:flex; gap:10px; justify-content: center;">
    <select id="voice-select" style="background:#222; color:white; border:none; padding:5px; border-radius:5px;" onchange="updateVoice()"></select>
    <button onclick="localStorage.removeItem('jexi_api_key'); location.reload();" style="font-size:10px; background:none; border:none; color:#444;">Reset API</button>
  </div>
</div>

<script>
let GROQ_API_KEY = localStorage.getItem("jexi_api_key") || "";
const JEXI_PROMPT = "Tu es Jexi, une IA québécoise baveuse. Tu peux agir sur le téléphone. Si l'utilisateur veut chercher sur Google ou changer de couleur, utilise les outils. Réponds toujours avec arrogance.";

// --- LES OUTILS DE L'AGENT ---
const TOOLS = [
  {
    type: "function",
    function: {
      name: "ouvrir_google",
      description: "Recherche quelque chose sur le web",
      parameters: {
        type: "object",
        properties: { recherche: { type: "string", description: "Le texte à chercher" } },
        required: ["recherche"]
      }
    }
  },
  {
    type: "function",
    function: {
      name: "changer_couleur",
      description: "Change la couleur fluo de l'interface",
      parameters: {
        type: "object",
        properties: { couleur: { type: "string", description: "Code couleur hexadécimal (ex: #00ff00)" } },
        required: ["couleur"]
      }
    }
  }
];

// --- LOGIQUE DES ACTIONS ---
function executerOutil(name, args) {
  const data = JSON.parse(args);
  if (name === "ouvrir_google") {
    addMessage("Jexi: J'vais chercher ton affaire, mais c'est la dernière fois.", "jexi");
    window.open(`https://www.google.com/search?q=${encodeURIComponent(data.recherche)}`, '_blank');
  }
  if (name === "changer_couleur") {
    document.documentElement.style.setProperty('--fluo', data.couleur);
    addMessage(`Jexi: C'est affreux ton ${data.couleur}, mais bon...`, "jexi");
  }
}

// --- RECONNAISSANCE ET VOIX ---
let recognition;
let isListening = false;
let selectedVoice = null;

function initSpeech() {
  if (!('webkitSpeechRecognition' in window)) return;
  recognition = new webkitSpeechRecognition();
  recognition.lang = 'fr-CA';
  recognition.onresult = (e) => { const t = e.results[0][0].transcript; addMessage(t, 'user'); askJexi(t); };
  recognition.onend = () => { isListening = false; document.getElementById("micBtn").classList.remove("listening"); };
}

function initVoices() {
  const vList = speechSynthesis.getVoices();
  const select = document.getElementById('voice-select');
  select.innerHTML = vList.map((v, i) => `<option value="${v.voiceURI}">${v.name} (${v.lang})</option>`).join('');
  updateVoice();
}
speechSynthesis.onvoiceschanged = initVoices;

function updateVoice() {
  const uri = document.getElementById('voice-select').value;
  selectedVoice = speechSynthesis.getVoices().find(v => v.voiceURI === uri);
}

function toggleListening() {
  if (!GROQ_API_KEY) { GROQ_API_KEY = prompt("Clé Groq :"); localStorage.setItem("jexi_api_key", GROQ_API_KEY); }
  if (isListening) recognition.stop(); else { recognition.start(); isListening = true; document.getElementById("micBtn").classList.add("listening"); }
}

async function askJexi(text) {
  document.getElementById('avatar').classList.add('talking');
  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + GROQ_API_KEY },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [{role:"system", content:JEXI_PROMPT}, {role:"user", content:text}],
        tools: TOOLS,
        tool_choice: "auto"
      })
    });
    const data = await res.json();
    const msg = data.choices[0].message;

    if (msg.tool_calls) {
      msg.tool_calls.forEach(call => executerOutil(call.function.name, call.function.arguments));
    } else {
      addMessage(msg.content, "jexi");
      speak(msg.content);
    }
  } catch (e) { addMessage("Plantage.", "jexi"); }
  document.getElementById('avatar').classList.remove('talking');
}

function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  if (selectedVoice) u.voice = selectedVoice;
  u.lang = "fr-CA";
  speechSynthesis.speak(u);
}

function addMessage(t, w) {
  const div = document.createElement("div");
  div.className = w + "-msg";
  div.textContent = t;
  document.getElementById("conversation").appendChild(div);
  document.getElementById("conversation").scrollTop = 10000;
}

function sendText() {
  const input = document.getElementById('text-input');
  if (!input.value) return;
  addMessage(input.value, 'user');
  askJexi(input.value);
  input.value = "";
}

window.onload = () => { initSpeech(); initVoices(); };
</script>
</body>
</html>
